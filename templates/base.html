<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="stylesheet" href="https://oat.ink/oat.min.css">
</head>
<body>
  <nav data-topnav>
    <div class="row">
      <div class="col-6">
        <a href="{{ get_url(path='@/_index.md') }}"><strong>{{ config.title }}</strong></a>
      </div>
      <div class="col-6 justify-end hstack">
        <a href="{{ get_url(path='@/notes/_index.md') }}">Notes</a>
        <a href="{{ get_url(path='@/digests/_index.md') }}">Digests</a>
        <a href="{{ get_url(path='tags') }}">Tags</a>
        <a href="{{ get_url(path='rss.xml') }}">RSS</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <header>
      <p>{{ config.extra.site_subtitle }}</p>
    </header>
    {% block content %}{% endblock content %}
  </main>

  <footer class="container">
    <hr>
    <p><small>Built with Zola and Oat. Reading notes, digests, and repo-driven curation.</small></p>
  </footer>
</body>
</html>
