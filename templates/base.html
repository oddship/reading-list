<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://oat.ink/oat.min.css">
  <style>
    :root {
      color-scheme: light dark;
      --background: #f6f2ea;
      --foreground: #1b1712;
      --card: rgba(255, 252, 247, 0.72);
      --card-foreground: #1b1712;
      --primary: #5e4634;
      --primary-foreground: #fffaf4;
      --secondary: rgba(94, 70, 52, 0.08);
      --secondary-foreground: #5e4634;
      --muted: rgba(94, 70, 52, 0.08);
      --muted-foreground: #736556;
      --faint: rgba(255, 255, 255, 0.52);
      --faint-foreground: #8f8070;
      --accent: rgba(94, 70, 52, 0.12);
      --danger: #b2452f;
      --danger-foreground: #fffaf4;
      --success: #2d6a4f;
      --success-foreground: #fffaf4;
      --warning: #9c6a11;
      --warning-foreground: #1b1712;
      --border: rgba(27, 23, 18, 0.12);
      --input: rgba(27, 23, 18, 0.16);
      --ring: rgba(94, 70, 52, 0.45);
      --page-glow: radial-gradient(circle at top left, rgba(188, 160, 120, 0.22), transparent 36%), radial-gradient(circle at top right, rgba(255, 255, 255, 0.55), transparent 28%);
      --max: 70rem;
    }
    body[data-theme="dark"] {
      --background: #17120f;
      --foreground: #f4ede4;
      --card: rgba(32, 25, 21, 0.76);
      --card-foreground: #f4ede4;
      --primary: #ddb38d;
      --primary-foreground: #18120f;
      --secondary: rgba(221, 179, 141, 0.12);
      --secondary-foreground: #f4ede4;
      --muted: rgba(221, 179, 141, 0.08);
      --muted-foreground: #bfae9e;
      --faint: rgba(255, 255, 255, 0.04);
      --faint-foreground: #998878;
      --accent: rgba(221, 179, 141, 0.1);
      --border: rgba(244, 237, 228, 0.14);
      --input: rgba(244, 237, 228, 0.18);
      --ring: rgba(221, 179, 141, 0.42);
      --page-glow: radial-gradient(circle at top left, rgba(145, 98, 59, 0.20), transparent 34%), radial-gradient(circle at top right, rgba(255, 255, 255, 0.04), transparent 30%);
    }
    html, body {
      min-height: 100%;
      background: var(--page-glow), var(--background);
      color: var(--foreground);
      font-family: "Instrument Sans", sans-serif;
    }
    body {
      margin: 0;
      background-attachment: fixed;
    }
    h1, h2, h3 {
      font-family: "Newsreader", serif;
      color: var(--foreground);
      letter-spacing: -0.025em;
      text-wrap: balance;
    }
    h1 {
      font-size: clamp(3.2rem, 8vw, 6.25rem);
      line-height: 0.93;
      margin: 0 0 1rem;
    }
    h2 {
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      line-height: 1.02;
      margin: 0 0 0.55rem;
    }
    h3 {
      font-size: clamp(1.15rem, 2vw, 1.55rem);
      line-height: 1.12;
      margin: 0 0 0.35rem;
    }
    p, li, small { color: var(--foreground); }
    small, .muted { color: var(--muted-foreground); }
    a {
      color: inherit;
      text-decoration-color: color-mix(in srgb, var(--primary) 45%, transparent);
      text-underline-offset: 0.14em;
    }
    a:hover { color: var(--primary); }
    .site-shell {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.1rem 1.1rem 4rem;
    }
    nav[data-topnav] {
      background: color-mix(in srgb, var(--background) 88%, transparent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.4rem;
      padding: 0.7rem 0 0.75rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 0.2rem 1rem color-mix(in srgb, var(--background) 35%, transparent);
    }
    nav[data-topnav] .row {
      align-items: center;
    }
    nav[data-topnav] a,
    nav[data-topnav] button {
      font-size: 0.95rem;
    }
    .brand-lockup strong {
      font-family: "Newsreader", serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .nav-links {
      display: flex;
      gap: 0.9rem;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
    }
    .hero {
      padding: 2.25rem 0 2.1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      display: grid;
      gap: 1rem;
    }
    .hero-kicker {
      color: var(--muted-foreground);
      margin-bottom: 0.45rem;
    }
    .hero-copy {
      max-width: 42rem;
      font-size: clamp(1.04rem, 2vw, 1.2rem);
      line-height: 1.62;
      color: var(--muted-foreground);
    }
    .hero-actions,
    .story-footer,
    .counts {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .kicker {
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .magazine-section { margin: 0 0 2.7rem; }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--border);
    }
    .section-head p {
      margin: 0.25rem 0 0;
      color: var(--muted-foreground);
      max-width: 35rem;
    }
    .feature {
      display: grid;
      gap: 0.95rem;
      padding: 1rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .feature p { max-width: 45rem; }
    .story-list {
      display: grid;
      gap: 1.2rem;
    }
    .story {
      padding: 0 0 1.15rem;
      border-bottom: 1px solid var(--border);
    }
    .story:last-child { border-bottom: 0; }
    .story-meta {
      color: var(--muted-foreground);
      font-size: 0.92rem;
      margin: 0 0 0.55rem;
    }
    .story-summary {
      max-width: 46rem;
      color: color-mix(in srgb, var(--foreground) 90%, var(--background));
      margin: 0.32rem 0 0.82rem;
      line-height: 1.58;
    }
    .button,
    button.button,
    .badge {
      border-radius: 999px;
    }
    .button:not(.outline),
    button.button:not(.outline),
    .badge:not(.outline):not([data-variant="secondary"]) {
      color: var(--primary-foreground) !important;
    }
    .button.outline,
    button.button.outline,
    .badge.outline,
    .badge[data-variant="secondary"] {
      color: var(--secondary-foreground) !important;
    }
    .archive-note {
      color: var(--muted-foreground);
      max-width: 30rem;
      margin-top: 0.2rem;
    }
    .prose,
    .prose p,
    .prose li {
      font-size: 1.04rem;
      line-height: 1.72;
    }
    .prose h2,
    .prose h3 {
      margin-top: 1.5rem;
    }
    footer.site-footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted-foreground);
    }
    @media (max-width: 720px) {
      .site-shell { padding: 1rem 0.95rem 3rem; }
      .section-head {
        align-items: start;
        flex-direction: column;
      }
      nav[data-topnav] .row {
        gap: 0.7rem;
      }
      .nav-links {
        justify-content: flex-start;
        gap: 0.65rem;
      }
      h1 { font-size: clamp(2.6rem, 14vw, 4rem); }
      .hero { padding-top: 1.7rem; }
    }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) {
        document.body.setAttribute('data-theme', t);
        document.body.style.colorScheme = t;
      }
    })();
    function syncThemeButton() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var current = document.body.getAttribute('data-theme') || 'system';
      btn.textContent = current === 'dark' ? 'Light' : current === 'light' ? 'Dark' : 'Theme';
    }
    function toggleTheme() {
      var current = document.body.getAttribute('data-theme') || 'light';
      var next = current === 'dark' ? 'light' : 'dark';
      document.body.style.colorScheme = next;
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      syncThemeButton();
    }
    document.addEventListener('DOMContentLoaded', syncThemeButton);
  </script>
</head>
<body>
  <div class="site-shell">
    <nav data-topnav>
      <div class="row">
        <div class="col-4 brand-lockup">
          <a href="{{ get_url(path='@/_index.md') }}"><strong>{{ config.title }}</strong></a>
        </div>
        <div class="col-8 nav-links">
          <a href="{{ get_url(path='@/notes/_index.md') }}">Notes</a>
          <a href="{{ get_url(path='@/digests/_index.md') }}">Digests</a>
          <a href="{{ get_url(path='@/about.md') }}">About</a>
          <a href="{{ get_url(path='tags') }}">Tags</a>
          <a href="{{ get_url(path='rss.xml') }}">RSS</a>
          <button id="theme-toggle" class="button outline small" onclick="toggleTheme()">Theme</button>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock content %}

    <footer class="site-footer">
      <p><small>Built with Zola and Oat. Reading notes, digests, and repo-driven curation.</small></p>
    </footer>
  </div>
</body>
</html>
