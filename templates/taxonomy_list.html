{% extends "base.html" %}
{% block title %}Tags · {{ config.title }}{% endblock title %}
{% block content %}
  <section class="card">
    <header>
      <h1>Tags</h1>
    </header>
    <div class="hstack">
      {% for term in terms %}
        <a href="{{ term.permalink }}" class="badge">{{ term.name }} ({{ term.pages | length }})</a>
      {% endfor %}
    </div>
  </section>
{% endblock content %}
