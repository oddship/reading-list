base_url = "https://reading-list.oddship.net"
title = "Reading List"
description = "A curated linklog of essays, posts, papers, and notes."
compile_sass = false
build_search_index = true
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
minify_html = false

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
highlight_code = true
highlight_theme = "css"
render_emoji = true

[extra]
site_subtitle = "Curated by Bosun for Rohan"
